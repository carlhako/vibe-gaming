<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Moon Buggy</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#000;
  display:flex; align-items:center; justify-content:center;
  height:100vh; overflow:hidden;
  font-family:'Courier New', monospace;
}
canvas { display:block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(function(){
'use strict';

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// Responsive sizing
function resize(){
  const scale = Math.min(window.innerWidth/800, window.innerHeight/420);
  canvas.width  = 800;
  canvas.height = 420;
  canvas.style.width  = Math.floor(800 * scale) + 'px';
  canvas.style.height = Math.floor(420 * scale) + 'px';
}
resize();
window.addEventListener('resize', resize);

// ─── Constants ────────────────────────────────────────────────────────────────
const W = 800, H = 420;
const GY = 330;          // ground surface Y
const BUGGY_X = 160;     // fixed screen X of buggy
const GRAVITY  = 0.58;
const JUMP_V   = -13.5;
const WHEEL_R  = 14;
const BODY_W   = 58, BODY_H = 22;
const BUGGY_BOTTOM = GY - 2; // where the bottom of wheels sit

// ─── State ────────────────────────────────────────────────────────────────────
let STATE = 'title';   // title | playing | dead | gameover
let score, best=0, lives, spd, frameN, invTimer, scrollX;
let bugY, bugVY, onGround, wheelAng;
let groundSegs, groundRight;
let rocks, ufos, bullets, particles;
let shootCD;

// ─── Stars ────────────────────────────────────────────────────────────────────
const STARS = Array.from({length:160}, ()=>({
  x: Math.random()*W, y: Math.random()*(GY-20),
  s: Math.random()*1.6+0.3,
  spd: 0.08 + Math.random()*0.25,
  ph: Math.random()*Math.PI*2
}));

// ─── Input ────────────────────────────────────────────────────────────────────
const KEY = {};
document.addEventListener('keydown', e=>{
  if(!KEY[e.code]){
    const jkeys = ['Space','ArrowUp','KeyW'];
    const skeys = ['KeyZ','KeyX','ShiftLeft','ControlLeft','ArrowRight'];
    if(jkeys.includes(e.code)){ e.preventDefault(); handleJump(); }
    if(skeys.includes(e.code)){ e.preventDefault(); handleShoot(); }
    if(['Enter','Space'].includes(e.code) && STATE!=='playing'){ e.preventDefault(); startGame(); }
  }
  KEY[e.code]=true;
  if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
});
document.addEventListener('keyup', e=>{ KEY[e.code]=false; });

// Touch — left half=jump, right half=shoot
canvas.addEventListener('touchstart', e=>{
  e.preventDefault();
  if(STATE!=='playing'){ startGame(); return; }
  const r = canvas.getBoundingClientRect();
  for(let t of e.changedTouches){
    const rx = (t.clientX - r.left)/r.width;
    if(rx<0.5) handleJump(); else handleShoot();
  }
},{passive:false});

function handleJump(){
  if(STATE!=='playing'){ startGame(); return; }
  if(onGround && invTimer<120){ bugVY=JUMP_V; onGround=false; }
}

function handleShoot(){
  if(STATE!=='playing') return;
  if(shootCD>0) return;
  const wx = scrollX + BUGGY_X;
  // Forward bullet
  bullets.push({x:wx+BODY_W/2+2, y:bugY-4, dx:spd+10, dy:0, t:'fwd', life:55});
  // Upward bullet
  bullets.push({x:wx+8, y:bugY-BODY_H/2-6, dx:spd*0.4, dy:-11, t:'up', life:38});
  shootCD=14;
}

// ─── Ground generation ────────────────────────────────────────────────────────
function initGround(){
  groundSegs=[]; groundRight=0;
  // Start with a long safe runway
  groundSegs.push({x:0, w:600, t:'solid'});
  groundRight=600;
}

function generateGround(toX){
  while(groundRight < toX){
    const last = groundSegs[groundSegs.length-1];
    let t, w;
    if(last.t==='crater'){
      t='solid'; w=90+Math.random()*170;
    } else {
      const cc = Math.min(0.28, 0.08 + score/120000);
      if(groundRight>700 && Math.random()<cc){
        t='crater';
        w=48 + Math.random()*70 + Math.min(35, score/5000);
      } else {
        t='solid'; w=80+Math.random()*180;
        // Maybe place a rock
        if(groundRight>700 && Math.random()<0.38){
          const rw=13+Math.random()*20, rh=10+Math.random()*16;
          const rx=groundRight + w*(0.2+Math.random()*0.6);
          rocks.push({x:rx, y:GY-rh, w:rw, h:rh});
        }
      }
    }
    groundSegs.push({x:groundRight, w, t});
    groundRight+=w;
  }
}

function getSegAt(wx){
  for(const s of groundSegs){
    if(wx>=s.x && wx<s.x+s.w) return s.t;
  }
  return 'solid';
}

// ─── Particles ────────────────────────────────────────────────────────────────
function burst(sx,sy,n,big){
  for(let i=0;i<n;i++){
    const ang=Math.random()*Math.PI*2, sp=big?(2+Math.random()*6):(1+Math.random()*3);
    particles.push({
      x:sx, y:sy,
      dx:Math.cos(ang)*sp, dy:Math.sin(ang)*sp - (big?4:1.5),
      life:big?(28+Math.random()*22):(12+Math.random()*14),
      r:big?(2.5+Math.random()*4):(1+Math.random()*2.5),
      col:big?`hsl(${10+Math.random()*50},100%,${50+Math.random()*20}%)`:'#bbb'
    });
  }
}

// ─── Hit buggy ────────────────────────────────────────────────────────────────
function hitBuggy(){
  if(invTimer>0) return;
  burst(BUGGY_X, bugY, 24, true);
  lives--;
  if(lives<=0){
    STATE='gameover';
    if(score>best) best=score;
  } else {
    invTimer=160;
    bugY = BUGGY_BOTTOM - WHEEL_R*2 - BODY_H/2;
    bugVY=0; onGround=true;
    // Push scrollX forward past any crater
    const wx = scrollX+BUGGY_X;
    for(const s of groundSegs){
      if(s.t==='crater' && wx>=s.x && wx<s.x+s.w){
        scrollX += (s.x+s.w - wx) + 40;
      }
    }
  }
}

// ─── Start game ───────────────────────────────────────────────────────────────
function startGame(){
  STATE='playing';
  score=0; lives=3; spd=3.2; frameN=0; invTimer=0; scrollX=0;
  bugY = BUGGY_BOTTOM - WHEEL_R*2 - BODY_H/2;
  bugVY=0; onGround=true; wheelAng=0;
  rocks=[]; ufos=[]; bullets=[]; particles=[]; shootCD=0;
  initGround();
  generateGround(W+600);
}

// ─── Update ───────────────────────────────────────────────────────────────────
function update(){
  if(STATE!=='playing') return;
  frameN++;
  score += Math.ceil(spd*0.7);

  // Ramp speed
  spd = Math.min(10, 3.2 + frameN/2800);

  scrollX += spd;
  generateGround(scrollX+W+600);

  // Trim old segments
  groundSegs = groundSegs.filter(s=>s.x+s.w>scrollX-80);
  rocks = rocks.filter(r=>r.x>scrollX-80);

  // ─ Buggy physics ─
  const groundSurface = BUGGY_BOTTOM - WHEEL_R*2 - BODY_H/2;
  const wx1 = scrollX + BUGGY_X - BODY_W*0.28;
  const wx2 = scrollX + BUGGY_X + BODY_W*0.28;
  const g1  = getSegAt(wx1);
  const g2  = getSegAt(wx2);
  const overCrater = g1==='crater' || g2==='crater';

  bugVY += GRAVITY;
  bugY  += bugVY;

  if(!overCrater && bugVY>=0 && bugY>=groundSurface){
    bugY=groundSurface; bugVY=0; onGround=true;
  } else {
    if(overCrater) onGround=false;
    if(bugVY<0) onGround=false;
    if(!overCrater && bugVY>0 && bugY<groundSurface) onGround=false;
  }

  if(bugY > GY+80){ hitBuggy(); return; }
  if(onGround) wheelAng += spd*0.13;

  // ─ Shoot cooldown ─
  if(shootCD>0) shootCD--;

  // ─ Spawn UFOs ─
  const ufoRate = Math.max(180, 420 - Math.floor(frameN/80)*8);
  if(frameN>200 && frameN%ufoRate===0){
    ufos.push({
      x:scrollX+W+50,
      y:55+Math.random()*130,
      dx:-(spd*0.65+1.2+Math.random()*1.2),
      ph:Math.random()*Math.PI*2, hp:1
    });
  }

  // ─ Update UFOs ─
  for(const u of ufos){ u.x+=u.dx; u.ph+=0.038; u.y+=Math.sin(u.ph)*0.75; }
  ufos=ufos.filter(u=>u.x>scrollX-120);

  // ─ Update bullets ─
  for(const b of bullets){ b.x+=b.dx; b.y+=b.dy; b.life--; }
  bullets=bullets.filter(b=>b.life>0 && b.y>-20 && b.x<scrollX+W+80);

  // ─ Update particles ─
  for(const p of particles){ p.x+=p.dx; p.y+=p.dy; p.dy+=0.22; p.life--; }
  particles=particles.filter(p=>p.life>0);

  // ─ Bullet vs rock ─
  for(const b of bullets){
    if(b.dead||b.t!=='fwd') continue;
    for(const r of rocks){
      if(r.dead) continue;
      const bsx=b.x-scrollX, rsx=r.x-scrollX;
      if(bsx>rsx-r.w/2-2&&bsx<rsx+r.w/2+2&&b.y>r.y-2&&b.y<r.y+r.h+2){
        r.dead=true; b.dead=true;
        burst(rsx, r.y+r.h/2, 9, false);
        score+=150; break;
      }
    }
  }

  // ─ Bullet vs UFO ─
  for(const b of bullets){
    if(b.dead||b.t!=='up') continue;
    for(const u of ufos){
      if(u.dead) continue;
      const bsx=b.x-scrollX, usx=u.x-scrollX;
      const dx=bsx-usx, dy=b.y-u.y;
      if(dx*dx+dy*dy<24*24){
        u.dead=true; b.dead=true;
        burst(usx, u.y, 18, true);
        score+=300; break;
      }
    }
  }
  bullets=bullets.filter(b=>!b.dead);
  rocks=rocks.filter(r=>!r.dead);
  ufos=ufos.filter(u=>!u.dead);

  // ─ Collisions with player ─
  if(invTimer>0){ invTimer--; return; }

  const bL=BUGGY_X-BODY_W/2+6, bR=BUGGY_X+BODY_W/2-6;
  const bT=bugY-BODY_H/2-WHEEL_R+4, bB=bugY+BODY_H/2+WHEEL_R*0.5;

  for(const r of rocks){
    const rsx=r.x-scrollX;
    if(rsx+r.w/2>bL&&rsx-r.w/2<bR&&r.y+r.h>bT&&r.y<bB){ hitBuggy(); return; }
  }
  for(const u of ufos){
    const usx=u.x-scrollX;
    if(Math.abs(usx-BUGGY_X)<46&&Math.abs(u.y-bugY)<28){ hitBuggy(); return; }
  }
}

// ─── Drawing helpers ──────────────────────────────────────────────────────────
function rrect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);
  ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);
  ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h);
  ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r);
  ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

function drawWheel(cx,cy,ang){
  ctx.save(); ctx.translate(cx,cy); ctx.rotate(ang);
  // Tire
  ctx.beginPath(); ctx.arc(0,0,WHEEL_R,0,Math.PI*2);
  ctx.fillStyle='#2a2a2a'; ctx.fill();
  ctx.strokeStyle='#444'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.arc(0,0,WHEEL_R,0,Math.PI*2); ctx.stroke();
  // Treads
  for(let i=0;i<8;i++){
    const a=i/8*Math.PI*2;
    ctx.strokeStyle='#555'; ctx.lineWidth=2.5;
    ctx.beginPath();
    ctx.moveTo(Math.cos(a)*(WHEEL_R-3),Math.sin(a)*(WHEEL_R-3));
    ctx.lineTo(Math.cos(a)*WHEEL_R,Math.sin(a)*WHEEL_R);
    ctx.stroke();
  }
  // Spokes
  ctx.strokeStyle='#777'; ctx.lineWidth=2;
  for(let i=0;i<4;i++){
    const a=i/4*Math.PI*2;
    ctx.beginPath();
    ctx.moveTo(0,0);
    ctx.lineTo(Math.cos(a)*(WHEEL_R-4),Math.sin(a)*(WHEEL_R-4));
    ctx.stroke();
  }
  // Hub
  ctx.beginPath(); ctx.arc(0,0,5,0,Math.PI*2);
  ctx.fillStyle='#aaa'; ctx.fill();
  ctx.beginPath(); ctx.arc(0,0,2,0,Math.PI*2);
  ctx.fillStyle='#ddd'; ctx.fill();
  ctx.restore();
}

function drawBuggy(){
  const sx=BUGGY_X, sy=bugY;
  if(invTimer>0 && Math.floor(invTimer/7)%2===0) return;

  const wy = sy + BODY_H/2 + WHEEL_R - 3;

  // Ground shadow
  const shdw = BUGGY_BOTTOM - WHEEL_R*2 - BODY_H/2 + BODY_H/2 + WHEEL_R*2 + 5;
  ctx.globalAlpha=0.25;
  ctx.fillStyle='#000';
  ctx.beginPath(); ctx.ellipse(sx,shdw,32,5,0,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha=1;

  // Axle
  ctx.strokeStyle='#666'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(sx-22,wy); ctx.lineTo(sx+22,wy); ctx.stroke();

  // Wheels
  drawWheel(sx-20, wy, wheelAng);
  drawWheel(sx+20, wy, wheelAng);

  // Suspension struts
  ctx.strokeStyle='#888'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(sx-18,sy+BODY_H/2-2); ctx.lineTo(sx-20,wy-WHEEL_R+2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(sx+18,sy+BODY_H/2-2); ctx.lineTo(sx+20,wy-WHEEL_R+2); ctx.stroke();

  // Main body
  ctx.fillStyle='#c8a000';
  rrect(sx-BODY_W/2, sy-BODY_H/2, BODY_W, BODY_H, 5);
  ctx.fill();
  ctx.fillStyle='#e8c000';
  rrect(sx-BODY_W/2+3, sy-BODY_H/2+3, BODY_W-6, BODY_H/2-2, 3);
  ctx.fill();
  ctx.strokeStyle='#a08000'; ctx.lineWidth=1.5;
  rrect(sx-BODY_W/2, sy-BODY_H/2, BODY_W, BODY_H, 5);
  ctx.stroke();

  // Cabin
  ctx.fillStyle='#2266aa';
  ctx.beginPath();
  ctx.moveTo(sx-18, sy-BODY_H/2+1);
  ctx.lineTo(sx+10, sy-BODY_H/2+1);
  ctx.lineTo(sx+6,  sy-BODY_H/2-18);
  ctx.lineTo(sx-12, sy-BODY_H/2-18);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle='#1144aa'; ctx.lineWidth=1;
  ctx.stroke();

  // Window
  ctx.fillStyle='#99ddff'; ctx.globalAlpha=0.85;
  ctx.beginPath();
  ctx.moveTo(sx-12, sy-BODY_H/2);
  ctx.lineTo(sx+7,  sy-BODY_H/2);
  ctx.lineTo(sx+4,  sy-BODY_H/2-13);
  ctx.lineTo(sx-9,  sy-BODY_H/2-13);
  ctx.closePath(); ctx.fill();
  ctx.globalAlpha=1;
  // window reflection
  ctx.fillStyle='rgba(255,255,255,0.4)';
  ctx.beginPath();
  ctx.moveTo(sx-10,sy-BODY_H/2-1);
  ctx.lineTo(sx-5, sy-BODY_H/2-1);
  ctx.lineTo(sx-8, sy-BODY_H/2-11);
  ctx.lineTo(sx-12,sy-BODY_H/2-11);
  ctx.closePath(); ctx.fill();

  // Antenna
  ctx.strokeStyle='#ccc'; ctx.lineWidth=1.5;
  ctx.beginPath();
  ctx.moveTo(sx-4, sy-BODY_H/2-18);
  ctx.lineTo(sx-7, sy-BODY_H/2-27);
  ctx.stroke();
  ctx.fillStyle='#ff3333';
  ctx.beginPath(); ctx.arc(sx-7, sy-BODY_H/2-27, 2.5, 0, Math.PI*2); ctx.fill();

  // Front gun barrel
  ctx.fillStyle='#777';
  ctx.fillRect(sx+BODY_W/2-4, sy-5, 18, 5);
  ctx.fillStyle='#999';
  ctx.fillRect(sx+BODY_W/2+8, sy-4, 8, 3);

  // Exhaust pipe at back
  ctx.fillStyle='#666';
  ctx.fillRect(sx-BODY_W/2-6, sy-4, 8, 4);
  ctx.fillStyle='rgba(150,150,150,0.3)';
  ctx.beginPath();
  ctx.arc(sx-BODY_W/2-8, sy-3+Math.sin(frameN*0.3)*1.5, 4, 0, Math.PI*2);
  ctx.fill();
}

function drawGround(){
  for(const seg of groundSegs){
    if(seg.t!=='solid') continue;
    const sx=seg.x-scrollX, sw=seg.w;
    if(sx+sw<-10||sx>W+10) continue;

    // Main fill
    const grd=ctx.createLinearGradient(0,GY,0,H);
    grd.addColorStop(0,'#999');
    grd.addColorStop(0.05,'#777');
    grd.addColorStop(1,'#555');
    ctx.fillStyle=grd;
    ctx.fillRect(sx,GY,sw,H-GY);

    // Top edge highlight
    ctx.fillStyle='#bbb';
    ctx.fillRect(sx,GY,sw,2);
    ctx.fillStyle='#ddd';
    ctx.fillRect(sx,GY,sw,1);

    // Surface texture
    ctx.fillStyle='#888';
    for(let tx=Math.floor(sx/18)*18; tx<sx+sw; tx+=18){
      for(let ty=GY+6; ty<H; ty+=18){
        const v=(tx*7+ty*13)%17;
        if(v<3){
          ctx.fillRect(tx,ty,v+1,1);
        }
      }
    }
    // Small embedded craters
    const seed=Math.floor(seg.x/60)|0;
    for(let i=0;i<4;i++){
      const cx=sx+((seed*37+i*71+13)%Math.max(1,sw-30))+15;
      const cy=GY+8+((seed*53+i*43)%18);
      const cr=3+((seed*29+i*17)%7);
      ctx.fillStyle='#666';
      ctx.beginPath(); ctx.ellipse(cx,cy,cr,cr*0.4,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#aaa';
      ctx.beginPath(); ctx.ellipse(cx-1,cy-1,cr*0.5,cr*0.2,0,0,Math.PI*2); ctx.fill();
    }
  }

  // Crater voids
  for(const seg of groundSegs){
    if(seg.t!=='crater') continue;
    const sx=seg.x-scrollX, sw=seg.w;
    if(sx+sw<-10||sx>W+10) continue;

    // Dark void
    ctx.fillStyle='#080808';
    ctx.fillRect(sx,GY,sw,H-GY);

    // Depth gradient
    const vg=ctx.createLinearGradient(0,GY,0,GY+80);
    vg.addColorStop(0,'rgba(0,0,20,0.9)');
    vg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=vg;
    ctx.fillRect(sx,GY,sw,80);

    // Left wall
    ctx.fillStyle='#666';
    ctx.fillRect(sx-3,GY,4,12);
    ctx.fillStyle='#444';
    ctx.fillRect(sx-2,GY+3,2,8);

    // Right wall
    ctx.fillStyle='#666';
    ctx.fillRect(sx+sw-1,GY,4,12);
    ctx.fillStyle='#444';
    ctx.fillRect(sx+sw,GY+3,2,8);

    // Crater floor glimmer
    ctx.fillStyle='rgba(30,30,60,0.5)';
    ctx.beginPath();
    ctx.ellipse(sx+sw/2, GY+60, sw*0.35, 8, 0, 0, Math.PI*2);
    ctx.fill();
  }
}

function drawRock(r){
  const sx=r.x-scrollX;
  if(sx<-50||sx>W+50) return;
  const sy=r.y;

  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.3)';
  ctx.beginPath(); ctx.ellipse(sx,GY+2,r.w*0.55,3,0,0,Math.PI*2); ctx.fill();

  // Rock body (multi-ellipse for lumpy look)
  ctx.fillStyle='#7a7a7a';
  ctx.beginPath();
  ctx.ellipse(sx, sy+r.h*0.65, r.w*0.52, r.h*0.52, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle='#6a6a6a';
  ctx.beginPath();
  ctx.ellipse(sx+r.w*0.15, sy+r.h*0.55, r.w*0.38, r.h*0.4, 0.3, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle='#999';
  ctx.beginPath();
  ctx.ellipse(sx-r.w*0.12, sy+r.h*0.35, r.w*0.3, r.h*0.25, -0.2, 0, Math.PI*2);
  ctx.fill();
  // Highlight
  ctx.fillStyle='rgba(255,255,255,0.18)';
  ctx.beginPath();
  ctx.ellipse(sx-r.w*0.1, sy+r.h*0.3, r.w*0.18, r.h*0.12, -0.4, 0, Math.PI*2);
  ctx.fill();
}

function drawUFO(u){
  const sx=u.x-scrollX, sy=u.y;
  if(sx<-70||sx>W+70) return;

  // Beam
  ctx.fillStyle='rgba(80,255,80,0.08)';
  ctx.beginPath();
  ctx.moveTo(sx-12,sy+10);
  ctx.lineTo(sx+12,sy+10);
  ctx.lineTo(sx+22,GY);
  ctx.lineTo(sx-22,GY);
  ctx.closePath(); ctx.fill();

  // Shadow on ground
  ctx.fillStyle='rgba(0,100,0,0.15)';
  ctx.beginPath(); ctx.ellipse(sx,GY+2,22,4,0,0,Math.PI*2); ctx.fill();

  // Body (saucer)
  ctx.fillStyle='#1e7a1e';
  ctx.beginPath(); ctx.ellipse(sx,sy,27,11,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#26a026';
  ctx.beginPath(); ctx.ellipse(sx,sy-1,25,8,0,0,Math.PI*2); ctx.fill();

  // Rim detail
  ctx.strokeStyle='#3ad03a'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.ellipse(sx,sy+3,25,7,0,0,Math.PI*2); ctx.stroke();

  // Dome
  ctx.fillStyle='#60e060';
  ctx.beginPath(); ctx.ellipse(sx,sy-4,13,10,0,Math.PI,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(180,255,180,0.5)';
  ctx.beginPath(); ctx.ellipse(sx-4,sy-9,5,4,0,0,Math.PI*2); ctx.fill();

  // Rotating lights
  const t=frameN*0.12;
  const cols=['#ff0','#f80','#f00','#ff0'];
  for(let i=0;i<4;i++){
    const a=i/4*Math.PI*2+t;
    const lx=sx+Math.cos(a)*20, ly=sy+Math.sin(a)*7;
    ctx.fillStyle=cols[i];
    ctx.beginPath(); ctx.arc(lx,ly,3,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,200,0,0.4)';
    ctx.beginPath(); ctx.arc(lx,ly,5,0,Math.PI*2); ctx.fill();
  }
}

function drawBullet(b){
  const sx=b.x-scrollX;
  if(sx<-15||sx>W+15) return;
  if(b.t==='fwd'){
    ctx.fillStyle='rgba(255,200,0,0.35)';
    ctx.beginPath(); ctx.ellipse(sx-5,b.y,9,3,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#ffe040';
    ctx.beginPath(); ctx.ellipse(sx,b.y,5,3,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.arc(sx+3,b.y,2,0,Math.PI*2); ctx.fill();
  } else {
    ctx.fillStyle='rgba(0,200,255,0.3)';
    ctx.beginPath(); ctx.ellipse(sx,b.y+5,3,7,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#00eeff';
    ctx.beginPath(); ctx.ellipse(sx,b.y,3,5,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.arc(sx,b.y-3,1.5,0,Math.PI*2); ctx.fill();
  }
}

function drawParticles(){
  for(const p of particles){
    const a=p.life/50;
    ctx.globalAlpha=Math.min(1,a*2);
    ctx.fillStyle=p.col;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r*Math.min(1,a*2),0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;
}

function drawMountains(){
  // Distant mountains (parallax at ~0.3x)
  ctx.fillStyle='#2a2a3a';
  ctx.beginPath();
  const moff = scrollX*0.25;
  ctx.moveTo(0, GY);
  for(let mx=0; mx<=W+60; mx+=40){
    const wx=mx+moff;
    const h=80+Math.sin(wx*0.015)*30+Math.sin(wx*0.031)*20+Math.cos(wx*0.007)*40;
    const ny=GY-h;
    if(mx===0) ctx.lineTo(0,ny); else ctx.lineTo(mx,ny);
  }
  ctx.lineTo(W,GY); ctx.closePath(); ctx.fill();

  // Mid mountains
  ctx.fillStyle='#222230';
  ctx.beginPath();
  const m2off=scrollX*0.45;
  ctx.moveTo(0,GY);
  for(let mx=0;mx<=W+40;mx+=30){
    const wx=mx+m2off;
    const h=40+Math.sin(wx*0.022)*20+Math.cos(wx*0.041)*15+Math.sin(wx*0.011)*25;
    ctx.lineTo(mx,GY-h);
  }
  ctx.lineTo(W,GY); ctx.closePath(); ctx.fill();
}

function drawEarth(){
  const ex=700, ey=75;
  // Glow
  const glw=ctx.createRadialGradient(ex,ey,50,ex,ey,75);
  glw.addColorStop(0,'rgba(60,120,255,0.15)');
  glw.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=glw;
  ctx.beginPath(); ctx.arc(ex,ey,75,0,Math.PI*2); ctx.fill();
  // Ocean
  ctx.fillStyle='#1a4a8a';
  ctx.beginPath(); ctx.arc(ex,ey,52,0,Math.PI*2); ctx.fill();
  // Continents
  ctx.fillStyle='#2a6a2a';
  ctx.beginPath(); ctx.ellipse(ex-8,ey-5,20,14,0.3,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(ex+14,ey+8,12,10,-0.2,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#336633';
  ctx.beginPath(); ctx.ellipse(ex-18,ey+10,10,8,0.5,0,Math.PI*2); ctx.fill();
  // Cloud bands
  ctx.fillStyle='rgba(255,255,255,0.25)';
  ctx.beginPath(); ctx.ellipse(ex,ey-18,40,5,0.1,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(ex+5,ey+14,32,4,-0.2,0,Math.PI*2); ctx.fill();
  // Atmosphere rim
  ctx.strokeStyle='rgba(100,160,255,0.4)';
  ctx.lineWidth=6;
  ctx.beginPath(); ctx.arc(ex,ey,55,0,Math.PI*2); ctx.stroke();
  ctx.lineWidth=1;
  // Specular highlight
  ctx.fillStyle='rgba(255,255,255,0.15)';
  ctx.beginPath(); ctx.ellipse(ex-18,ey-18,16,10,0.8,0,Math.PI*2); ctx.fill();
}

function drawStars(){
  for(const s of STARS){
    s.x -= s.spd*(STATE==='playing'?spd:1)*0.04;
    if(s.x<0) s.x=W+(Math.random()*20);
    const tw=0.6+0.4*Math.sin(frameN*0.015+s.ph);
    ctx.globalAlpha=tw*0.9;
    ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.arc(s.x,s.y,s.s,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;
}

function drawHUD(){
  // Top bar
  ctx.fillStyle='rgba(0,0,0,0.6)';
  ctx.fillRect(0,0,W,32);
  ctx.strokeStyle='rgba(0,255,0,0.3)';
  ctx.lineWidth=1;
  ctx.strokeRect(0,0,W,32);

  ctx.font='bold 16px "Courier New",monospace';
  ctx.fillStyle='#00ff44';
  ctx.fillText(`SCORE: ${score.toString().padStart(7,'0')}`, 10, 22);

  ctx.fillStyle='#aaaa00';
  ctx.fillText(`BEST: ${best.toString().padStart(7,'0')}`, 200, 22);

  ctx.fillStyle='#888';
  ctx.font='13px "Courier New",monospace';
  ctx.fillText(`SPD:${spd.toFixed(1)}`, 395, 22);

  // Lives as hearts
  for(let i=0;i<3;i++){
    ctx.font='18px sans-serif';
    ctx.fillStyle = i<lives ? '#ff3333' : '#331111';
    ctx.fillText('♥', W-36-i*30, 22);
  }

  // Bottom controls hint
  ctx.font='11px "Courier New",monospace';
  ctx.fillStyle='rgba(150,150,150,0.7)';
  ctx.fillText('[↑/SPACE] Jump   [Z/X] Shoot   Touch: Left=Jump  Right=Shoot', 10, H-6);
}

function drawTitle(){
  // Sky
  const sg=ctx.createLinearGradient(0,0,0,GY);
  sg.addColorStop(0,'#000010');
  sg.addColorStop(1,'#000828');
  ctx.fillStyle=sg;
  ctx.fillRect(0,0,W,H);
  drawStars();
  drawEarth();
  drawMountains();
  ctx.fillStyle='#888';
  ctx.fillRect(0,GY,W,H-GY);
  ctx.fillStyle='#bbb'; ctx.fillRect(0,GY,W,2);

  // Title panel
  const px=W/2-220,py=55,pw=440,ph=240;
  ctx.fillStyle='rgba(0,15,0,0.88)';
  ctx.strokeStyle='#00cc44'; ctx.lineWidth=2;
  rrect(px,py,pw,ph,10);
  ctx.fill();
  rrect(px,py,pw,ph,10);
  ctx.stroke();
  // Inner glow border
  ctx.strokeStyle='rgba(0,255,100,0.15)'; ctx.lineWidth=6;
  rrect(px+4,py+4,pw-8,ph-8,8);
  ctx.stroke(); ctx.lineWidth=1;

  ctx.textAlign='center';
  // ASCII art style title
  ctx.font='bold 46px "Courier New",monospace';
  ctx.fillStyle='#00ff55';
  ctx.shadowColor='#00ff55'; ctx.shadowBlur=15;
  ctx.fillText('MOON BUGGY', W/2, 115);
  ctx.shadowBlur=0;

  ctx.font='13px "Courier New",monospace';
  ctx.fillStyle='#88aa88';
  ctx.fillText('Drive the lunar rover across the moon surface!', W/2, 148);

  // Controls
  ctx.font='14px "Courier New",monospace';
  ctx.fillStyle='#ffee44';
  ctx.fillText('⬆ SPACE / UP ARROW — Jump over craters', W/2, 180);
  ctx.fillStyle='#44eeff';
  ctx.fillText('Z / X — Fire gun (forward + upward)', W/2, 203);
  ctx.fillStyle='#ff7744';
  ctx.fillText('Avoid rocks, craters & alien UFOs!', W/2, 226);

  const blink=Math.floor(frameN/25)%2;
  if(blink){
    ctx.font='bold 17px "Courier New",monospace';
    ctx.fillStyle='#00ff99';
    ctx.fillText('— PRESS ANY KEY OR TAP TO START —', W/2, 268);
  }
  ctx.textAlign='left';
}

function drawGameOver(){
  ctx.fillStyle='rgba(0,0,0,0.75)';
  ctx.fillRect(0,0,W,H);

  ctx.textAlign='center';
  ctx.font='bold 52px "Courier New",monospace';
  ctx.fillStyle='#ff2222';
  ctx.shadowColor='#ff0000'; ctx.shadowBlur=20;
  ctx.fillText('GAME OVER', W/2, H/2-55);
  ctx.shadowBlur=0;

  ctx.font='22px "Courier New",monospace';
  ctx.fillStyle='#ffee00';
  ctx.fillText(`Score: ${score.toString().padStart(7,'0')}`, W/2, H/2-5);

  ctx.fillStyle='#00ff66';
  ctx.fillText(`Best:  ${best.toString().padStart(7,'0')}`, W/2, H/2+32);

  if(Math.floor(frameN/28)%2){
    ctx.font='bold 16px "Courier New",monospace';
    ctx.fillStyle='#ffffff';
    ctx.fillText('PRESS ANY KEY OR TAP TO PLAY AGAIN', W/2, H/2+85);
  }
  ctx.textAlign='left';
}

// ─── Main draw ────────────────────────────────────────────────────────────────
function draw(){
  // Sky gradient
  const sg=ctx.createLinearGradient(0,0,0,GY);
  sg.addColorStop(0,'#00000f');
  sg.addColorStop(0.7,'#000520');
  sg.addColorStop(1,'#001030');
  ctx.fillStyle=sg;
  ctx.fillRect(0,0,W,H);

  if(STATE==='title'){ drawTitle(); return; }

  drawStars();
  drawEarth();
  drawMountains();
  drawGround();

  for(const r of rocks) drawRock(r);
  for(const u of ufos)  drawUFO(u);
  for(const b of bullets) drawBullet(b);

  drawBuggy();
  drawParticles();
  drawHUD();

  if(STATE==='gameover') drawGameOver();
}

// ─── Loop ─────────────────────────────────────────────────────────────────────
function loop(){
  frameN++;
  update();
  draw();
  requestAnimationFrame(loop);
}

// Start
STATE='title'; frameN=0;
loop();

})();
</script>
</body>
