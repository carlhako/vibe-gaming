<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Sample Snake</title>
<style>
  html, body { margin: 0; height: 100%; background: #000; display: flex; align-items: center; justify-content: center; font-family: ui-monospace, Menlo, Consolas, monospace; color: #ffb400; }
  #wrap { text-align: center; }
  canvas { background: #0b0e11; border: 2px solid #262b32; image-rendering: pixelated; }
  #score { margin-bottom: 8px; font-size: 14px; letter-spacing: .05em; }
  #hint { margin-top: 8px; font-size: 11px; color: #6b7480; }
</style>
</head>
<body>
<div id="wrap">
  <div id="score">SCORE: 0</div>
  <canvas id="c" width="320" height="320"></canvas>
  <div id="hint">ARROW KEYS TO MOVE &middot; SPACE TO RESTART</div>
</div>
<script>
(function () {
  const GRID = 16;
  const CELLS = 20;
  const canvas = document.getElementById("c");
  const ctx = canvas.getContext("2d");
  const scoreEl = document.getElementById("score");

  let snake, dir, nextDir, food, score, alive, loopId;

  function reset() {
    snake = [{ x: 10, y: 10 }, { x: 9, y: 10 }, { x: 8, y: 10 }];
    dir = { x: 1, y: 0 };
    nextDir = dir;
    score = 0;
    alive = true;
    placeFood();
    scoreEl.textContent = "SCORE: 0";
  }

  function placeFood() {
    let pos;
    do {
      pos = { x: Math.floor(Math.random() * CELLS), y: Math.floor(Math.random() * CELLS) };
    } while (snake.some((s) => s.x === pos.x && s.y === pos.y));
    food = pos;
  }

  function tick() {
    if (!alive) return;
    dir = nextDir;
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

    const hitWall = head.x < 0 || head.y < 0 || head.x >= CELLS || head.y >= CELLS;
    const hitSelf = snake.some((s) => s.x === head.x && s.y === head.y);
    if (hitWall || hitSelf) {
      alive = false;
      draw();
      return;
    }

    snake.unshift(head);
    if (head.x === food.x && head.y === food.y) {
      score += 10;
      scoreEl.textContent = "SCORE: " + score;
      placeFood();
    } else {
      snake.pop();
    }
    draw();
  }

  function draw() {
    ctx.fillStyle = "#0b0e11";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#ff6b6b";
    ctx.fillRect(food.x * GRID, food.y * GRID, GRID - 1, GRID - 1);

    ctx.fillStyle = "#ffb400";
    snake.forEach((s, i) => {
      ctx.globalAlpha = i === 0 ? 1 : 0.75;
      ctx.fillRect(s.x * GRID, s.y * GRID, GRID - 1, GRID - 1);
    });
    ctx.globalAlpha = 1;

    if (!alive) {
      ctx.fillStyle = "rgba(0,0,0,0.6)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#ffb400";
      ctx.font = "16px ui-monospace, monospace";
      ctx.textAlign = "center";
      ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2 - 8);
      ctx.font = "11px ui-monospace, monospace";
      ctx.fillText("PRESS SPACE TO RESTART", canvas.width / 2, canvas.height / 2 + 14);
    }
  }

  const KEY_DIRS = {
    ArrowUp: { x: 0, y: -1 },
    ArrowDown: { x: 0, y: 1 },
    ArrowLeft: { x: -1, y: 0 },
    ArrowRight: { x: 1, y: 0 },
  };

  document.addEventListener("keydown", (e) => {
    if (e.code === "Space") {
      reset();
      return;
    }
    const d = KEY_DIRS[e.key];
    if (!d) return;
    if (d.x === -dir.x && d.y === -dir.y) return; // no 180-degree turns
    nextDir = d;
  });

  reset();
  loopId = setInterval(tick, 110);
})();
</script>
</body>
</html>
