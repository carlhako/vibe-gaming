<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Whack-a-Mole!</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: linear-gradient(180deg, #6abf3a 0%, #4a8c2a 55%, #3a7020 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Arial, sans-serif;
      user-select: none;
      touch-action: none;
    }

    h1 {
      color: #fff;
      font-size: 2.4rem;
      font-weight: 900;
      text-shadow: 2px 3px 0 rgba(0,0,0,0.3);
      margin-bottom: 14px;
    }

    /* ── HUD ─────────────────────────────────────────────────── */
    .hud {
      display: flex;
      gap: 18px;
      margin-bottom: 18px;
    }

    .stat {
      background: rgba(0,0,0,0.28);
      border: 2px solid rgba(255,255,255,0.15);
      border-radius: 14px;
      padding: 7px 20px;
      text-align: center;
      min-width: 86px;
    }

    .stat-label {
      color: rgba(255,255,255,0.6);
      font-size: 0.62rem;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .stat-value {
      color: #fff;
      font-size: 1.9rem;
      font-weight: 900;
      line-height: 1.1;
    }

    .stat-value.bump {
      animation: scoreBump 0.28s ease-out;
    }

    @keyframes scoreBump {
      0%   { transform: scale(1);   color: #fff;    }
      45%  { transform: scale(1.45); color: #ffd700; }
      100% { transform: scale(1);   color: #fff;    }
    }

    #timerVal.danger {
      color: #ff6b6b;
      animation: timerDanger 0.38s ease-in-out infinite alternate;
    }

    @keyframes timerDanger {
      from { opacity: 1;   }
      to   { opacity: 0.4; }
    }

    /* ── Grid ────────────────────────────────────────────────── */
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 150px);
      gap: 14px;
      background: rgba(0,0,0,0.12);
      border-radius: 22px;
      border: 3px solid rgba(255,255,255,0.08);
      padding: 20px;
    }

    /* ── Hole ────────────────────────────────────────────────── */
    .hole {
      position: relative;
      width: 150px;
      height: 150px;
      cursor: pointer;
    }

    /* Dark oval = the hole */
    .hole-shadow {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: 108px;
      height: 52px;
      background: radial-gradient(ellipse, #0c0500 0%, #1a0a02 100%);
      border-radius: 50%;
      z-index: 1;
      box-shadow: inset 0 5px 14px rgba(0,0,0,0.9);
    }

    /* Mole */
    .mole {
      position: absolute;
      bottom: 12px;
      left: 50%;
      width: 80px;
      height: 88px;
      transform: translateX(-50%) translateY(115%);
      transition: transform 0.14s cubic-bezier(0.34, 1.45, 0.64, 1);
      z-index: 2;
      pointer-events: none;
    }

    .hole.up .mole {
      transform: translateX(-50%) translateY(8%);
    }

    .hole.whacked .mole {
      transform: translateX(-50%) translateY(115%);
      transition: transform 0.09s ease-in;
    }

    /* Dirt rim hides mole's lower body */
    .hole-dirt {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 132px;
      height: 44px;
      background: radial-gradient(ellipse at 50% 22%, #a47040 0%, #7c4e28 52%, #5c3815 100%);
      border-radius: 50%;
      z-index: 3;
      pointer-events: none;
      box-shadow: 0 -2px 6px rgba(0,0,0,0.22);
    }

    /* Hit flash */
    .hole.whacked::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 14px;
      background: rgba(255,255,80,0.3);
      z-index: 6;
      animation: hitFlash 0.28s ease-out forwards;
      pointer-events: none;
    }

    @keyframes hitFlash {
      0%   { opacity: 1; }
      100% { opacity: 0; }
    }

    /* Score popup */
    .pop {
      position: absolute;
      top: 12px;
      left: 50%;
      font-size: 1.5rem;
      font-weight: 900;
      color: #ffd700;
      text-shadow: 0 2px 4px rgba(0,0,0,0.5);
      z-index: 10;
      pointer-events: none;
      animation: popUp 0.65s ease-out forwards;
    }

    @keyframes popUp {
      0%   { opacity: 1; transform: translateX(-50%) translateY(0)    scale(1);   }
      100% { opacity: 0; transform: translateX(-50%) translateY(-50px) scale(1.4); }
    }

    /* ── Overlays ─────────────────────────────────────────────── */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 50;
      backdrop-filter: blur(3px);
    }

    .card {
      background: linear-gradient(145deg, #3d7022, #2b5019);
      border-radius: 24px;
      padding: 36px 46px;
      text-align: center;
      border: 3px solid rgba(255,255,255,0.12);
      box-shadow: 0 24px 60px rgba(0,0,0,0.55);
      max-width: 320px;
      width: 90%;
    }

    .card h2 {
      color: #fff;
      font-size: 2rem;
      font-weight: 900;
      text-shadow: 0 2px 8px rgba(0,0,0,0.3);
      margin-bottom: 10px;
    }

    .card p {
      color: rgba(255,255,255,0.78);
      font-size: 0.95rem;
      margin-bottom: 20px;
      line-height: 1.6;
    }

    .card p strong { color: #ffd700; }

    .final-score {
      color: #ffd700;
      font-size: 4rem;
      font-weight: 900;
      text-shadow: 0 3px 10px rgba(0,0,0,0.3);
      margin: 6px 0 22px;
      line-height: 1;
    }

    .btn {
      background: linear-gradient(180deg, #ffe040 0%, #e6b800 100%);
      color: #1a3a0a;
      font-size: 1.15rem;
      font-weight: 900;
      padding: 13px 34px;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 5px 0 #9a7800, 0 8px 18px rgba(0,0,0,0.3);
      transition: transform 0.1s, box-shadow 0.1s;
      letter-spacing: 0.5px;
    }

    .btn:hover  { transform: translateY(-2px); box-shadow: 0 7px 0 #9a7800, 0 10px 22px rgba(0,0,0,0.3); }
    .btn:active { transform: translateY(3px);  box-shadow: 0 2px 0 #9a7800, 0 3px  8px rgba(0,0,0,0.2); }

    /* ── Responsive ──────────────────────────────────────────── */
    @media (max-width: 510px) {
      .grid { grid-template-columns: repeat(3, 100px); gap: 8px; padding: 12px; }
      .hole { width: 100px; height: 100px; }
      .hole-shadow { width: 72px; height: 35px; bottom: 12px; }
      .mole { width: 56px; height: 62px; bottom: 7px; }
      .hole-dirt { width: 90px; height: 29px; }
      h1 { font-size: 1.6rem; }
      .hud { gap: 10px; }
      .stat { min-width: 70px; padding: 6px 12px; }
      .stat-value { font-size: 1.45rem; }
      .card { padding: 28px 28px; }
    }
  </style>
</head>
<body>

<h1>🔨 Whack-a-Mole!</h1>

<div class="hud">
  <div class="stat">
    <div class="stat-label">Score</div>
    <div class="stat-value" id="scoreVal">0</div>
  </div>
  <div class="stat">
    <div class="stat-label">Time</div>
    <div class="stat-value" id="timerVal">30</div>
  </div>
  <div class="stat">
    <div class="stat-label">Best</div>
    <div class="stat-value" id="bestVal">0</div>
  </div>
</div>

<div class="grid" id="grid"></div>

<!-- Start screen -->
<div class="overlay" id="startScreen">
  <div class="card">
    <h2>🦡 Whack-a-Mole!</h2>
    <p>Moles will pop up from the holes.<br>
       Click or tap them fast!<br><br>
       <strong>30 seconds</strong> — how many can you get?</p>
    <button class="btn" id="startBtn">▶ Play!</button>
  </div>
</div>

<!-- End screen -->
<div class="overlay" id="endScreen" style="display:none">
  <div class="card">
    <h2>⏰ Time's Up!</h2>
    <p>Final Score</p>
    <div class="final-score" id="finalVal">0</div>
    <button class="btn" id="restartBtn">🔄 Play Again</button>
  </div>
</div>

<script>
// ─── Inline SVG Moles ─────────────────────────────────────────────────────────
const SVG_NORMAL = `<svg viewBox="0 0 80 88" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%">
  <ellipse cx="40" cy="75" rx="27" ry="15" fill="#7a4f30"/>
  <ellipse cx="40" cy="44" rx="30" ry="32" fill="#9B6840"/>
  <ellipse cx="15" cy="26" rx="9"   ry="11" fill="#7a4f30"/>
  <ellipse cx="65" cy="26" rx="9"   ry="11" fill="#7a4f30"/>
  <ellipse cx="15" cy="26" rx="5.5" ry="7"  fill="#d4906a" opacity=".55"/>
  <ellipse cx="65" cy="26" rx="5.5" ry="7"  fill="#d4906a" opacity=".55"/>
  <circle  cx="28" cy="38" r="7"   fill="#111"/>
  <circle  cx="52" cy="38" r="7"   fill="#111"/>
  <circle  cx="30" cy="36" r="2.5" fill="#fff"/>
  <circle  cx="54" cy="36" r="2.5" fill="#fff"/>
  <ellipse cx="40" cy="57" rx="16" ry="13" fill="#c4856a"/>
  <ellipse cx="40" cy="51" rx="8"  ry="6"  fill="#d45882"/>
  <circle  cx="37" cy="52" r="1.8" fill="#903055"/>
  <circle  cx="43" cy="52" r="1.8" fill="#903055"/>
  <path d="M33 62 Q40 69 47 62" stroke="#7a3020" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <ellipse cx="24" cy="82" rx="10" ry="6" fill="#7a4f30"/>
  <ellipse cx="56" cy="82" rx="10" ry="6" fill="#7a4f30"/>
</svg>`;

const SVG_DAZED = `<svg viewBox="0 0 80 88" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%">
  <ellipse cx="40" cy="75" rx="27" ry="15" fill="#7a4f30"/>
  <ellipse cx="40" cy="44" rx="30" ry="32" fill="#9B6840"/>
  <ellipse cx="15" cy="26" rx="9"   ry="11" fill="#7a4f30"/>
  <ellipse cx="65" cy="26" rx="9"   ry="11" fill="#7a4f30"/>
  <ellipse cx="15" cy="26" rx="5.5" ry="7"  fill="#d4906a" opacity=".55"/>
  <ellipse cx="65" cy="26" rx="5.5" ry="7"  fill="#d4906a" opacity=".55"/>
  <line x1="22" y1="32" x2="34" y2="44" stroke="#333" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="34" y1="32" x2="22" y2="44" stroke="#333" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="46" y1="32" x2="58" y2="44" stroke="#333" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="58" y1="32" x2="46" y2="44" stroke="#333" stroke-width="3.5" stroke-linecap="round"/>
  <ellipse cx="40" cy="57" rx="16" ry="13" fill="#c4856a"/>
  <ellipse cx="40" cy="51" rx="8"  ry="6"  fill="#d45882"/>
  <circle  cx="37" cy="52" r="1.8" fill="#903055"/>
  <circle  cx="43" cy="52" r="1.8" fill="#903055"/>
  <path d="M33 60 Q36 56 40 60 Q44 64 47 60" stroke="#7a3020" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <ellipse cx="24" cy="82" rx="10" ry="6" fill="#7a4f30"/>
  <ellipse cx="56" cy="82" rx="10" ry="6" fill="#7a4f30"/>
  <text x="3"  y="18" font-size="13" fill="#ffd700">★</text>
  <text x="59" y="16" font-size="13" fill="#ffd700">★</text>
  <text x="33" y="10" font-size="11" fill="#ff9900">✦</text>
</svg>`;

// ─── Constants ────────────────────────────────────────────────────────────────
const NUM_HOLES   = 9;
const GAME_SECS   = 30;

// ─── Game State ───────────────────────────────────────────────────────────────
let score       = 0;
let bestScore   = 0;
let timeLeft    = GAME_SECS;
let running     = false;
let timerID     = null;
let spawnID     = null;
const isUp      = new Array(NUM_HOLES).fill(false);
const hideTmr   = new Array(NUM_HOLES).fill(null);

// ─── Audio (Web Audio API) ────────────────────────────────────────────────────
let audioCtx = null;

function getAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
  }
  return audioCtx;
}

function tone(freq, type, dur, vol, delay) {
  delay = delay || 0;
  const c = getAudio();
  if (!c) return;
  try {
    const t0 = c.currentTime + delay;
    const osc = c.createOscillator();
    const gn  = c.createGain();
    osc.connect(gn); gn.connect(c.destination);
    osc.type = type;
    osc.frequency.value = freq;
    gn.gain.setValueAtTime(vol, t0);
    gn.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
    osc.start(t0); osc.stop(t0 + dur + 0.02);
  } catch(e) {}
}

function sndHit()   { tone(200,'sawtooth',0.12,0.3); tone(110,'sawtooth',0.1,0.2,0.07); }
function sndTick()  { tone(880,'square',0.04,0.07); }
function sndStart() { [440,660,880].forEach(function(f,i){ tone(f,'square',0.1,0.15,i*0.09); }); }
function sndEnd()   { [440,330,220].forEach(function(f,i){ tone(f,'sine',0.22,0.2,i*0.13); }); }

// ─── Build Grid ───────────────────────────────────────────────────────────────
var gridEl = document.getElementById('grid');
var holes  = [];

for (var hi = 0; hi < NUM_HOLES; hi++) {
  (function(idx) {
    var h = document.createElement('div');
    h.className = 'hole';
    h.innerHTML =
      '<div class="hole-shadow"></div>' +
      '<div class="mole">' + SVG_NORMAL + '</div>' +
      '<div class="hole-dirt"></div>';

    h.addEventListener('pointerdown', function(e) {
      e.preventDefault();
      if (!running) return;
      if (isUp[idx]) whack(idx);
    });

    gridEl.appendChild(h);
    holes.push(h);
  })(hi);
}

// ─── HUD ─────────────────────────────────────────────────────────────────────
var scoreEl = document.getElementById('scoreVal');
var timerEl = document.getElementById('timerVal');
var bestEl  = document.getElementById('bestVal');

function renderHUD() {
  scoreEl.textContent = score;
  timerEl.textContent = timeLeft;
  bestEl.textContent  = bestScore;
  if (timeLeft <= 5) {
    timerEl.classList.add('danger');
  } else {
    timerEl.classList.remove('danger');
  }
}

function bumpScore() {
  scoreEl.classList.remove('bump');
  void scoreEl.offsetWidth; // force reflow to restart animation
  scoreEl.classList.add('bump');
}

// ─── Difficulty Helpers ───────────────────────────────────────────────────────
function elapsed() { return GAME_SECS - timeLeft; }

function spawnDelay() {
  var t = elapsed() / GAME_SECS;
  return Math.max(480, 1250 - t * 800) + Math.random() * 220;
}

function showDuration() {
  var t = elapsed() / GAME_SECS;
  return Math.max(580, 1400 - t * 900) + Math.random() * 150;
}

// ─── Mole Management ─────────────────────────────────────────────────────────
function raiseMole(i) {
  if (!running || isUp[i]) return;
  isUp[i] = true;
  holes[i].querySelector('.mole').innerHTML = SVG_NORMAL;
  holes[i].classList.add('up');
  hideTmr[i] = setTimeout(function() { lowerMole(i, false); }, showDuration());
}

function lowerMole(i, hit) {
  if (!isUp[i]) return;
  isUp[i] = false;
  clearTimeout(hideTmr[i]);
  hideTmr[i] = null;
  holes[i].classList.remove('up');
  if (hit) {
    holes[i].classList.add('whacked');
    setTimeout(function() { holes[i].classList.remove('whacked'); }, 360);
  }
}

function whack(i) {
  if (!running || !isUp[i]) return;
  holes[i].querySelector('.mole').innerHTML = SVG_DAZED;
  lowerMole(i, true);
  score++;
  renderHUD();
  bumpScore();
  sndHit();

  var pop = document.createElement('div');
  pop.className = 'pop';
  pop.style.left = '50%';
  pop.textContent = '+1';
  holes[i].appendChild(pop);
  setTimeout(function() { if (pop.parentNode) pop.parentNode.removeChild(pop); }, 680);
}

// ─── Mole Spawner ─────────────────────────────────────────────────────────────
function scheduleSpawn() {
  if (!running) return;
  spawnID = setTimeout(function() {
    if (!running) return;
    var free = [];
    for (var i = 0; i < NUM_HOLES; i++) { if (!isUp[i]) free.push(i); }
    if (free.length) {
      raiseMole(free[Math.floor(Math.random() * free.length)]);
    }
    scheduleSpawn();
  }, spawnDelay());
}

// ─── Game Lifecycle ───────────────────────────────────────────────────────────
function startGame() {
  score    = 0;
  timeLeft = GAME_SECS;
  running  = true;
  clearInterval(timerID);
  clearTimeout(spawnID);

  for (var i = 0; i < NUM_HOLES; i++) {
    isUp[i] = false;
    clearTimeout(hideTmr[i]);
    hideTmr[i] = null;
    holes[i].classList.remove('up', 'whacked');
    holes[i].querySelector('.mole').innerHTML = SVG_NORMAL;
  }

  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('endScreen').style.display   = 'none';
  renderHUD();
  sndStart();

  timerID = setInterval(function() {
    timeLeft--;
    if (timeLeft <= 5) sndTick();
    renderHUD();
    if (timeLeft <= 0) endGame();
  }, 1000);

  scheduleSpawn();
}

function endGame() {
  running = false;
  clearInterval(timerID);
  clearTimeout(spawnID);
  for (var i = 0; i < NUM_HOLES; i++) lowerMole(i, false);
  if (score > bestScore) bestScore = score;
  renderHUD();
  sndEnd();
  document.getElementById('finalVal').textContent    = score;
  document.getElementById('endScreen').style.display = 'flex';
}

document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('restartBtn').addEventListener('click', startGame);

renderHUD(); // show initial 0s immediately
</script>
</body>
</html>
