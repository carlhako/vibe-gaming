<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Block Dodge</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a1a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Segoe UI', Arial, sans-serif;
    user-select: none;
  }
  #ui {
    display: flex;
    gap: 40px;
    margin-bottom: 12px;
    color: #fff;
    font-size: 18px;
    font-weight: bold;
    letter-spacing: 1px;
  }
  #ui span { color: #7df; }
  #canvasWrapper {
    position: relative;
    display: inline-block;
    line-height: 0;
  }
  canvas {
    border: 2px solid #2a4a7f;
    border-radius: 6px;
    box-shadow: 0 0 40px #1a3a6f88;
    display: block;
  }
  #pauseBtn {
    position: absolute;
    top: 8px;
    right: 8px;
    width: 38px;
    height: 38px;
    background: rgba(10, 20, 50, 0.82);
    border: 2px solid #2a5a9f;
    border-radius: 8px;
    color: #7df;
    font-size: 17px;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 10;
    -webkit-tap-highlight-color: transparent;
    outline: none;
    transition: background 0.1s;
  }
  #pauseBtn:active { background: #2a4a8a; }
  #controls {
    margin-top: 12px;
    color: #556;
    font-size: 13px;
    text-align: center;
    line-height: 1.8;
  }
  #touchBtns {
    display: none;
    gap: 20px;
    margin-top: 14px;
  }
  .tbtn {
    width: 80px; height: 60px;
    background: #1a2a4a;
    border: 2px solid #2a5a9f;
    border-radius: 10px;
    color: #7df;
    font-size: 28px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    -webkit-tap-highlight-color: transparent;
  }
  .tbtn:active { background: #2a4a8a; }
  @media (pointer: coarse) {
    #touchBtns { display: flex; }
    #controls { display: none; }
  }
</style>
</head>
<body>
<div id="ui">
  <div>SCORE <span id="scoreEl">0</span></div>
  <div>BEST <span id="bestEl">0</span></div>
  <div>LEVEL <span id="levelEl">1</span></div>
</div>
<div id="canvasWrapper">
  <canvas id="c"></canvas>
  <button id="pauseBtn" title="Pause (P)">⏸</button>
</div>
<div id="controls">← → or A D to move &nbsp;|&nbsp; P or Esc to pause &nbsp;|&nbsp; Touch buttons on mobile</div>
<div id="touchBtns">
  <div class="tbtn" id="btnLeft">◀</div>
  <div class="tbtn" id="btnRight">▶</div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const scoreEl  = document.getElementById('scoreEl');
const bestEl   = document.getElementById('bestEl');
const levelEl  = document.getElementById('levelEl');
const pauseBtn = document.getElementById('pauseBtn');

// Responsive canvas
const MAX_W = 420, MAX_H = 620;
let W, H, scale;
function resize() {
  const vw = Math.min(window.innerWidth - 20, MAX_W);
  const vh = Math.min(window.innerHeight - 180, MAX_H);
  scale = Math.min(vw / MAX_W, vh / MAX_H);
  W = Math.round(MAX_W * scale);
  H = Math.round(MAX_H * scale);
  canvas.width  = W;
  canvas.height = H;
}
resize();
window.addEventListener('resize', () => { resize(); });

// ---- Game State ----
const PLAYER_W = () => 48 * scale;
const PLAYER_H = () => 20 * scale;
const BLOCK_W_BASE = () => 48 * scale;
const BLOCK_H = () => 22 * scale;

let state = 'start'; // 'start' | 'play' | 'paused' | 'dead'
let score = 0, best = 0, level = 1;
let frameCount = 0;

let player, blocks, particles, shakeTime, spawnTimer, spawnInterval, blockSpeed;

function initGame() {
  player = {
    x: W / 2,
    y: H - 40 * scale,
    w: PLAYER_W(),
    h: PLAYER_H(),
    vx: 0,
    trail: []
  };
  blocks = [];
  particles = [];
  shakeTime = 0;
  spawnTimer = 0;
  score = 0;
  frameCount = 0;
  level = 1;
  spawnInterval = 90;
  blockSpeed = 3 * scale;
  state = 'play';
  pauseBtn.textContent = '⏸';
  pauseBtn.style.display = 'flex';
}

// ---- Pause ----
function togglePause() {
  if (state === 'play') {
    state = 'paused';
    pauseBtn.textContent = '▶';
  } else if (state === 'paused') {
    state = 'play';
    pauseBtn.textContent = '⏸';
  }
}

// ---- Input ----
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.key] = true;
  if ((e.key === ' ' || e.key === 'Enter') && state !== 'play' && state !== 'paused') {
    initGame();
  }
  if ((e.key === 'p' || e.key === 'P' || e.key === 'Escape') && (state === 'play' || state === 'paused')) {
    togglePause();
  }
});
window.addEventListener('keyup', e => { keys[e.key] = false; });

// Pause button click/tap
pauseBtn.addEventListener('pointerdown', e => {
  e.stopPropagation();
  togglePause();
});

// Touch buttons
const btnL = document.getElementById('btnLeft');
const btnR = document.getElementById('btnRight');
btnL.addEventListener('pointerdown', () => { keys['ArrowLeft']  = true; });
btnL.addEventListener('pointerup',   () => { keys['ArrowLeft']  = false; });
btnL.addEventListener('pointerleave',() => { keys['ArrowLeft']  = false; });
btnR.addEventListener('pointerdown', () => { keys['ArrowRight'] = true; });
btnR.addEventListener('pointerup',   () => { keys['ArrowRight'] = false; });
btnR.addEventListener('pointerleave',() => { keys['ArrowRight'] = false; });

// Canvas tap to restart (only on non-play states)
canvas.addEventListener('pointerdown', () => {
  if (state !== 'play' && state !== 'paused') initGame();
});

// ---- Colors ----
const BLOCK_COLORS = [
  '#e74c3c','#e67e22','#f1c40f','#2ecc71','#3498db','#9b59b6','#1abc9c','#e91e63'
];
const PLAYER_COLOR = '#7df';
const PLAYER_GLOW  = '#3af';

// ---- Particles ----
function spawnParticles(x, y, color, count = 14) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = (1.5 + Math.random() * 4) * scale;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      decay: 0.025 + Math.random() * 0.03,
      r: (3 + Math.random() * 5) * scale,
      color
    });
  }
}

// ---- Spawn block ----
function spawnBlock() {
  const minW = BLOCK_W_BASE();
  const maxW = minW * 2.2;
  const bw = minW + Math.random() * (maxW - minW);
  const bx = Math.random() * (W - bw);
  const col = BLOCK_COLORS[Math.floor(Math.random() * BLOCK_COLORS.length)];
  const wide = level >= 3 && Math.random() < 0.15;
  blocks.push({
    x: bx,
    y: -BLOCK_H(),
    w: wide ? W * 0.65 + Math.random() * W * 0.15 : bw,
    h: BLOCK_H(),
    color: col,
    speed: blockSpeed * (0.8 + Math.random() * 0.5),
    spin: (Math.random() - 0.5) * 0.04,
    angle: 0
  });
}

// ---- Collision ----
function rectsOverlap(ax, ay, aw, ah, bx, by, bw, bh) {
  return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
}

// ---- Update ----
function update() {
  if (state !== 'play') return;
  frameCount++;
  score = Math.floor(frameCount / 60);
  level = 1 + Math.floor(score / 10);
  blockSpeed = (3 + level * 0.6) * scale;
  spawnInterval = Math.max(28, 90 - level * 7);

  // Player movement
  const speed = 5.5 * scale;
  if (keys['ArrowLeft']  || keys['a'] || keys['A']) player.vx = -speed;
  else if (keys['ArrowRight'] || keys['d'] || keys['D']) player.vx = speed;
  else player.vx *= 0.72;

  player.x += player.vx;
  if (player.x - player.w / 2 < 0) player.x = player.w / 2;
  if (player.x + player.w / 2 > W) player.x = W - player.w / 2;

  // Trail
  player.trail.unshift({ x: player.x, y: player.y });
  if (player.trail.length > 10) player.trail.pop();

  // Spawn blocks
  spawnTimer++;
  if (spawnTimer >= spawnInterval) {
    spawnBlock();
    spawnTimer = 0;
  }

  // Move blocks
  for (let i = blocks.length - 1; i >= 0; i--) {
    const b = blocks[i];
    b.y += b.speed;
    b.angle += b.spin;
    if (rectsOverlap(
      player.x - player.w / 2, player.y - player.h / 2, player.w, player.h,
      b.x, b.y, b.w, b.h
    )) {
      spawnParticles(player.x, player.y, PLAYER_COLOR, 24);
      spawnParticles(b.x + b.w / 2, b.y + b.h / 2, b.color, 14);
      shakeTime = 18;
      state = 'dead';
      pauseBtn.style.display = 'none';
      if (score > best) best = score;
      return;
    }
    if (b.y > H + 40) blocks.splice(i, 1);
  }

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.12 * scale;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }

  if (shakeTime > 0) shakeTime--;
}

// ---- Draw ----
function drawBlock(b) {
  ctx.save();
  ctx.translate(b.x + b.w / 2, b.y + b.h / 2);
  ctx.rotate(b.angle);
  ctx.shadowColor = b.color;
  ctx.shadowBlur  = 12 * scale;
  const grad = ctx.createLinearGradient(-b.w/2, -b.h/2, b.w/2, b.h/2);
  grad.addColorStop(0, lighten(b.color, 40));
  grad.addColorStop(1, b.color);
  ctx.fillStyle = grad;
  roundRect(ctx, -b.w / 2, -b.h / 2, b.w, b.h, 5 * scale);
  ctx.fill();
  ctx.shadowBlur = 0;
  ctx.strokeStyle = lighten(b.color, 60);
  ctx.lineWidth = 1.5;
  roundRect(ctx, -b.w / 2, -b.h / 2, b.w, b.h, 5 * scale);
  ctx.stroke();
  ctx.restore();
}

function drawPlayer() {
  for (let i = player.trail.length - 1; i >= 0; i--) {
    const t = player.trail[i];
    const alpha = (1 - i / player.trail.length) * 0.18;
    ctx.fillStyle = `rgba(100,210,255,${alpha})`;
    const tw = player.w * (1 - i / player.trail.length * 0.5);
    const th = player.h * 0.6;
    ctx.fillRect(t.x - tw / 2, t.y - th / 2, tw, th);
  }
  ctx.save();
  ctx.shadowColor = PLAYER_GLOW;
  ctx.shadowBlur = 20 * scale;
  const pg = ctx.createLinearGradient(
    player.x - player.w / 2, player.y,
    player.x + player.w / 2, player.y
  );
  pg.addColorStop(0, '#5be');
  pg.addColorStop(0.5, '#aef');
  pg.addColorStop(1, '#5be');
  ctx.fillStyle = pg;
  roundRect(ctx, player.x - player.w / 2, player.y - player.h / 2, player.w, player.h, 7 * scale);
  ctx.fill();
  ctx.fillStyle = '#fff8';
  ctx.beginPath();
  ctx.ellipse(player.x, player.y - player.h * 0.1, player.w * 0.18, player.h * 0.3, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;
  ctx.strokeStyle = '#9ef';
  ctx.lineWidth = 1.5;
  roundRect(ctx, player.x - player.w / 2, player.y - player.h / 2, player.w, player.h, 7 * scale);
  ctx.stroke();
  ctx.restore();
  const eg = ctx.createRadialGradient(player.x, player.y + player.h / 2, 0, player.x, player.y + player.h / 2, 14 * scale);
  eg.addColorStop(0, 'rgba(100,200,255,0.6)');
  eg.addColorStop(1, 'rgba(100,200,255,0)');
  ctx.fillStyle = eg;
  ctx.beginPath();
  ctx.ellipse(player.x, player.y + player.h / 2, 14 * scale, 8 * scale, 0, 0, Math.PI * 2);
  ctx.fill();
}

function drawParticles() {
  for (const p of particles) {
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 6 * scale;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

function drawBackground() {
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, '#0a0a22');
  bg.addColorStop(1, '#0d1a30');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#fff';
  for (let i = 0; i < 50; i++) {
    const sx = pseudoRand(i * 17 + 3) * W;
    const sy = pseudoRand(i * 13 + 7) * H;
    const r  = pseudoRand(i * 11 + 1) * 1.5 * scale;
    const twinkle = 0.4 + 0.6 * Math.sin(frameCount * 0.03 + i);
    ctx.globalAlpha = twinkle * 0.7;
    ctx.beginPath();
    ctx.arc(sx, sy, r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  ctx.strokeStyle = 'rgba(40,80,140,0.15)';
  ctx.lineWidth = 1;
  const gridY = (frameCount * 2 * scale) % (40 * scale);
  for (let y = -40 * scale + gridY; y < H; y += 40 * scale) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
  for (let x = 0; x < W; x += 50 * scale) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
}

function drawHUD() {
  scoreEl.textContent = score;
  bestEl.textContent  = best;
  levelEl.textContent = level;

  const barW = W * 0.6;
  const barX = (W - barW) / 2;
  const barY = H - 10 * scale;
  ctx.fillStyle = '#1a2a3a';
  roundRect(ctx, barX, barY, barW, 4 * scale, 2 * scale);
  ctx.fill();
  const prog = Math.min(1, (score % 10) / 10);
  const grad = ctx.createLinearGradient(barX, 0, barX + barW * prog, 0);
  grad.addColorStop(0, '#3af');
  grad.addColorStop(1, '#f3a');
  ctx.fillStyle = grad;
  roundRect(ctx, barX, barY, barW * prog, 4 * scale, 2 * scale);
  ctx.fill();
}

function drawStartScreen() {
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(0, 0, W, H);

  ctx.textAlign = 'center';
  ctx.shadowColor = '#7df';
  ctx.shadowBlur  = 30 * scale;
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${Math.round(48 * scale)}px 'Segoe UI', Arial`;
  ctx.fillText('BLOCK DODGE', W / 2, H / 2 - 70 * scale);

  ctx.shadowBlur = 0;
  ctx.fillStyle = '#7df';
  ctx.font = `${Math.round(18 * scale)}px 'Segoe UI', Arial`;
  ctx.fillText('Dodge the falling blocks!', W / 2, H / 2 - 30 * scale);

  ctx.fillStyle = '#aaa';
  ctx.font = `${Math.round(15 * scale)}px 'Segoe UI', Arial`;
  ctx.fillText('← → or A D to move', W / 2, H / 2 + 10 * scale);

  const pulse = 0.6 + 0.4 * Math.sin(frameCount * 0.08);
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${Math.round(20 * scale)}px 'Segoe UI', Arial`;
  ctx.fillText('PRESS SPACE / TAP TO START', W / 2, H / 2 + 60 * scale);
  ctx.globalAlpha = 1;
  ctx.restore();
}

function drawDeadScreen() {
  const sx = shakeTime > 0 ? (Math.random() - 0.5) * 10 * scale : 0;
  const sy = shakeTime > 0 ? (Math.random() - 0.5) * 10 * scale : 0;
  ctx.save();
  ctx.translate(sx, sy);

  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, W, H);

  ctx.textAlign = 'center';
  ctx.shadowColor = '#f44';
  ctx.shadowBlur = 30 * scale;
  ctx.fillStyle = '#f66';
  ctx.font = `bold ${Math.round(46 * scale)}px 'Segoe UI', Arial`;
  ctx.fillText('GAME OVER', W / 2, H / 2 - 70 * scale);

  ctx.shadowBlur = 0;
  ctx.fillStyle = '#fff';
  ctx.font = `${Math.round(20 * scale)}px 'Segoe UI', Arial`;
  ctx.fillText(`Score: ${score}`, W / 2, H / 2 - 20 * scale);

  if (score >= best && score > 0) {
    ctx.fillStyle = '#fd0';
    ctx.font = `bold ${Math.round(17 * scale)}px 'Segoe UI', Arial`;
    ctx.fillText('✦ NEW BEST ✦', W / 2, H / 2 + 14 * scale);
  } else {
    ctx.fillStyle = '#aaa';
    ctx.font = `${Math.round(16 * scale)}px 'Segoe UI', Arial`;
    ctx.fillText(`Best: ${best}`, W / 2, H / 2 + 14 * scale);
  }

  const pulse = 0.6 + 0.4 * Math.sin(frameCount * 0.08);
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${Math.round(18 * scale)}px 'Segoe UI', Arial`;
  ctx.fillText('PRESS SPACE / TAP TO RETRY', W / 2, H / 2 + 60 * scale);
  ctx.globalAlpha = 1;
  ctx.restore();
}

function drawPauseScreen() {
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.58)';
  ctx.fillRect(0, 0, W, H);

  ctx.textAlign = 'center';
  ctx.shadowColor = '#7df';
  ctx.shadowBlur  = 32 * scale;
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${Math.round(50 * scale)}px 'Segoe UI', Arial`;
  ctx.fillText('PAUSED', W / 2, H / 2 - 30 * scale);

  ctx.shadowBlur = 0;
  ctx.fillStyle = '#7df';
  ctx.font = `${Math.round(16 * scale)}px 'Segoe UI', Arial`;
  ctx.fillText('Press P / Esc  or tap ▶ to resume', W / 2, H / 2 + 22 * scale);
  ctx.restore();
}

// ---- Helpers ----
function roundRect(ctx, x, y, w, h, r) {
  r = Math.min(r, w / 2, h / 2);
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function lighten(hex, amt) {
  let r = parseInt(hex.slice(1,3),16);
  let g = parseInt(hex.slice(3,5),16);
  let b = parseInt(hex.slice(5,7),16);
  r = Math.min(255, r + amt);
  g = Math.min(255, g + amt);
  b = Math.min(255, b + amt);
  return `rgb(${r},${g},${b})`;
}

function pseudoRand(n) {
  const x = Math.sin(n + 1) * 10000;
  return x - Math.floor(x);
}

// ---- Init for start screen ----
player = {
  x: W / 2, y: H - 40 * scale,
  w: PLAYER_W(), h: PLAYER_H(),
  vx: 0, trail: []
};
blocks = []; particles = []; shakeTime = 0;
spawnTimer = 0; spawnInterval = 90;
blockSpeed = 3 * scale;
frameCount = 0; score = 0; level = 1;

for (let i = 0; i < 5; i++) {
  spawnBlock();
  blocks[i].y = Math.random() * H;
}

// ---- Loop ----
function loop() {
  requestAnimationFrame(loop);
  frameCount++;

  if (state === 'start' || state === 'dead') {
    // Animate demo blocks
    for (let i = blocks.length - 1; i >= 0; i--) {
      blocks[i].y += blocks[i].speed * 0.5;
      blocks[i].angle += blocks[i].spin;
      if (blocks[i].y > H + 40) {
        blocks.splice(i, 1);
        spawnBlock();
      }
    }
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy;
      p.vy += 0.1 * scale;
      p.life -= p.decay;
      if (p.life <= 0) particles.splice(i, 1);
    }
  } else if (state === 'play') {
    update();
  }
  // 'paused': nothing updates, game is frozen

  // Sync pause button visibility
  pauseBtn.style.display = (state === 'play' || state === 'paused') ? 'flex' : 'none';

  // Draw
  drawBackground();
  for (const b of blocks) drawBlock(b);
  if (state === 'play' || state === 'paused') {
    drawPlayer();
    drawHUD();
  }
  drawParticles();
  if (state === 'start') drawStartScreen();
  if (state === 'dead') {
    drawPlayer();
    drawDeadScreen();
    if (shakeTime > 0) shakeTime--;
  }
  if (state === 'paused') drawPauseScreen();
}

loop();
</script>
</body>
</html>
