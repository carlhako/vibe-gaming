<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sign in — The Vibe Arcade</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="shell">
    <main class="cabinet form-page">
      <div class="cabinet-plate">
        <span class="power-light on"></span>
        <span class="now-playing">SIGN IN</span>
      </div>
      <div class="form-panel">
        <a class="back-link" href="{{ url_for('index') }}">&larr; back to the shelf</a>
        <h1>Sign in</h1>
        <p class="form-hint">Paste the token you saved when you created your account.</p>
        {% if error %}
        <p class="form-error">{{ error }}</p>
        {% endif %}
        <form method="post" action="{{ url_for('sign_in_submit') }}">
          <label class="field-label" for="token">Token</label>
          <input type="text" id="token" name="token" maxlength="32" autocomplete="off"
                 value="{{ token or '' }}" placeholder="paste your token here">
          <button type="submit">Sign in</button>
        </form>
      </div>
    </main>
  </div>
</body>
</html>
