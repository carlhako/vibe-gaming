<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Generating… — The Vibe Arcade</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="shell">
    <main class="cabinet form-page">
      <div class="cabinet-plate">
        <span class="power-light on" id="power-light"></span>
        <span class="now-playing">STATUS</span>
      </div>
      <div class="form-panel status-panel" id="status-panel" data-job-id="{{ job_id }}">
        <a class="back-link" href="{{ url_for('index') }}">&larr; back to the shelf</a>
        <h1 id="status-heading">Queued&hellip;</h1>
        <p class="form-hint">
          This can take up to 20 minutes. This page's URL is unique
          to your request — bookmark it or just leave the tab; it's safe
          to close and come back, generation keeps running in the
          background.
        </p>
        <p class="form-hint" id="status-detail">Waiting for a worker to pick this up.</p>
        <div class="status-actions" id="status-actions" hidden></div>
      </div>
    </main>
  </div>
  <script src="{{ url_for('static', filename='status.js') }}"></script>
</body>
</html>
